<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Legal Tech Cover</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --color-primary: #0D1117;
      --color-secondary: #161B22;
      --color-accent: #58A6FF;
      --color-accent-alt: #F78166;
      --color-text: #F0F6FC;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }

    #cover-canvas {
      width: 1200px;
      height: 627px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px;
    }

    /* Background geometric accents */
    .bg-accent {
      position: absolute;
      opacity: 0.1;
      z-index: 1;
    }

    .accent-circle {
      width: 400px;
      height: 400px;
      border: 2px solid var(--color-accent);
      border-radius: 50%;
      top: -100px;
      right: -100px;
    }

    .accent-line {
      width: 2px;
      height: 200px;
      background: var(--color-accent);
      left: 10%;
      top: 20%;
    }

    /* Content */
    .cover-content {
      position: relative;
      z-index: 2;
    }

    .cover-stat {
      font-family: var(--font-display);
      font-size: 84px;
      font-weight: 700;
      color: var(--color-accent);
      margin-bottom: 10px;
      line-height: 1;
      letter-spacing: -2px;
    }

    .cover-headline {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 30px;
      line-height: 1.2;
      letter-spacing: -1px;
      max-width: 900px;
    }

    .cover-subheadline {
      font-family: var(--font-body);
      font-size: 20px;
      color: var(--color-accent-alt);
      margin-bottom: 40px;
      font-weight: 500;
    }

    .cover-footer {
      font-size: 14px;
      color: var(--color-text);
      opacity: 0.6;
      position: absolute;
      bottom: 20px;
      left: 20px;
    }

    /* Controls */
    .download-section {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .download-btn {
      padding: 12px 24px;
      background: var(--color-accent);
      color: var(--color-primary);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: var(--font-body);
      font-size: 14px;
      transition: background 0.2s;
    }

    .download-btn:hover {
      background: var(--color-accent-alt);
    }
  </style>
</head>
<body>

  <div id="cover-canvas">
    <!-- Background accents -->
    <div class="bg-accent accent-circle"></div>
    <div class="bg-accent accent-line"></div>

    <!-- Main content -->
    <div class="cover-content">
      <div class="cover-stat">$47K</div>
      <div class="cover-headline">
        How I Cut Legal Fees Using a $20/Month AI
      </div>
      <div class="cover-subheadline">
        The legal tech shift happening now
      </div>
    </div>

    <!-- Footer -->
    <div class="cover-footer">
      Fused Gaming LLC | April 2026
    </div>
  </div>

  <div class="download-section">
    <button onclick="downloadCover()" class="download-btn">
      ↓ Download as PNG (1200×627)
    </button>
    <button onclick="location.reload()" class="download-btn" style="background: var(--color-secondary);">
      ← Reset
    </button>
  </div>

  <script>
    async function downloadCover() {
      const canvas = document.getElementById('cover-canvas');
      try {
        const result = await html2canvas(canvas, {
          scale: 2,
          useCORS: true,
          width: 1200,
          height: 627,
          backgroundColor: getComputedStyle(canvas).backgroundColor,
          logging: false
        });

        const link = document.createElement('a');
        const timestamp = new Date().toISOString().slice(0, 10);
        link.download = `linkedin-cover-${timestamp}.png`;
        link.href = result.toDataURL('image/png');
        link.click();
      } catch (err) {
        alert('Error downloading cover. Please try a different browser.');
        console.error(err);
      }
    }
  </script>

</body>
</html>

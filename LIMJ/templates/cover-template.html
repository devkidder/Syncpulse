<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Cover Generator</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --color-primary: #0D1117;
      --color-secondary: #161B22;
      --color-accent: #58A6FF;
      --color-accent-alt: #F78166;
      --color-text: #F0F6FC;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }

    #cover-canvas {
      width: 1200px;
      height: 627px;
      background: var(--color-primary);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px;
    }

    .cover-headline {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 20px;
      line-height: 1.2;
      letter-spacing: -1px;
    }

    .cover-subheadline {
      font-family: var(--font-body);
      font-size: 24px;
      color: var(--color-accent);
      margin-bottom: 40px;
    }

    .cover-accent {
      font-size: 18px;
      color: var(--color-text);
      opacity: 0.8;
    }

    .download-section {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .download-btn {
      padding: 12px 24px;
      background: var(--color-accent);
      color: var(--color-primary);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: var(--font-body);
      font-size: 14px;
      transition: background 0.2s;
    }

    .download-btn:hover {
      background: var(--color-accent-alt);
    }
  </style>
</head>
<body>

  <div id="cover-canvas">
    <div class="cover-headline">
      [Your Headline Here]
    </div>
    <div class="cover-subheadline">
      [Your Subheadline]
    </div>
    <div class="cover-accent">
      Fused Gaming LLC | 2026
    </div>
  </div>

  <div class="download-section">
    <button onclick="downloadCover()" class="download-btn">
      ↓ Download as PNG (1200×627)
    </button>
  </div>

  <script>
    async function downloadCover() {
      const canvas = document.getElementById('cover-canvas');
      const result = await html2canvas(canvas, {
        scale: 2,
        useCORS: true,
        width: 1200,
        height: 627,
        backgroundColor: getComputedStyle(canvas).backgroundColor
      });

      const link = document.createElement('a');
      const timestamp = new Date().toISOString().slice(0, 10);
      link.download = `linkedin-cover-${timestamp}.png`;
      link.href = result.toDataURL('image/png');
      link.click();
    }
  </script>

</body>
</html>
